name: Tests
on:
  push:
    branches:
      - main

defaults:
  run:
    working-directory: services/users

jobs:
  tests-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'
          cache-dependency-path: services/users/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test
