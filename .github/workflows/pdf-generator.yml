name: Tests PDF Generation Service
on:
  push:
    branches:
      - main

defaults:
  run:
    working-directory: services/pdf_generator

jobs:
  test-pdf-gen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'
          cache-dependency-path: services/pdf_generator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          echo "STARTING TESTS"
          npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: test-pdf-gen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./services/pdf_generator
          push: true
          tag: ${{ secrets.DOCKERHUB_USERNAME }}/ita_pdf:latest
